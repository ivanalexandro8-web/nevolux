<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nevolux — Crear cuenta</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-side">
      <svg viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
        <defs>
          <style>
            .node { fill: #3edbd1; }
            .edge { stroke: #2a9d95; stroke-width: 1; opacity: 0.5; }
            .pulse { animation: pulse 3.5s ease-in-out infinite; }
            @keyframes pulse { 0%,100% { opacity: 0.25; } 50% { opacity: 0.9; } }
          </style>
        </defs>
        <g class="edge">
          <line x1="90" y1="120" x2="260" y2="230" />
          <line x1="260" y1="230" x2="480" y2="160" />
          <line x1="260" y1="230" x2="180" y2="400" />
          <line x1="180" y1="400" x2="410" y2="440" />
          <line x1="410" y1="440" x2="480" y2="160" />
          <line x1="180" y1="400" x2="80" y2="560" />
          <line x1="410" y1="440" x2="500" y2="600" />
          <line x1="500" y1="600" x2="300" y2="700" />
          <line x1="80" y1="560" x2="300" y2="700" />
        </g>
        <g class="node">
          <circle cx="90" cy="120" r="5" class="pulse" style="animation-delay:0s" />
          <circle cx="480" cy="160" r="7" class="pulse" style="animation-delay:0.5s" />
          <circle cx="260" cy="230" r="9" class="pulse" style="animation-delay:1s" />
          <circle cx="180" cy="400" r="6" class="pulse" style="animation-delay:1.5s" />
          <circle cx="410" cy="440" r="8" class="pulse" style="animation-delay:2s" />
          <circle cx="80" cy="560" r="5" class="pulse" style="animation-delay:2.5s" />
          <circle cx="500" cy="600" r="6" class="pulse" style="animation-delay:3s" />
          <circle cx="300" cy="700" r="9" class="pulse" style="animation-delay:3.5s" />
        </g>
      </svg>
      <div class="content">
        <div class="brand">nevo<span>lux</span></div>
      </div>
      <div class="content">
        <p class="auth-tagline">
          Estudiante o asesor, tu cuenta se conecta a la misma red. Si vas a asesorar,
          necesitas ir en 4º cuatrimestre o más, y presentar el examen de tu materia
          antes de recibir estudiantes.
        </p>
      </div>
    </div>

    <div class="auth-form-col">
      <div class="auth-card">
        <div class="auth-tabs">
          <a href="index.html">Iniciar sesión</a>
          <a href="registro.html" class="active">Crear cuenta</a>
        </div>

        <h2>Crea tu cuenta</h2>

        <div class="role-toggle">
          <button type="button" id="tab-estudiante" class="active">Soy estudiante</button>
          <button type="button" id="tab-asesor">Soy asesor</button>
        </div>

        <!-- FORMULARIO ESTUDIANTE -->
        <form id="form-estudiante">
          <div class="grid grid-2">
            <div><label for="e-nombre">Nombre(s)</label><input type="text" id="e-nombre" required /></div>
            <div><label for="e-matricula">Matrícula</label><input type="text" id="e-matricula" required /></div>
          </div>
          <div class="grid grid-2">
            <div><label for="e-ap">Apellido paterno</label><input type="text" id="e-ap" required /></div>
            <div><label for="e-am">Apellido materno</label><input type="text" id="e-am" required /></div>
          </div>

          <label for="e-nacimiento">Fecha de nacimiento</label>
          <input type="date" id="e-nacimiento" required />

          <label for="e-correo">Correo institucional</label>
          <input type="email" id="e-correo" placeholder="utp0139797@alumno.utpuebla.edu.mx" required />
          <div class="field-error" id="e-correo-error"></div>

          <div class="grid grid-2">
            <div>
              <label for="e-cuatrimestre">Cuatrimestre</label>
              <input type="number" id="e-cuatrimestre" min="1" max="12" required />
            </div>
            <div>
              <label for="e-carrera">Especialidad</label>
              <select id="e-carrera" required>
                <option value="">Selecciona...</option>
                <option value="Desarrollo de Software">Desarrollo de Software</option>
                <option value="Redes Digitales">Redes Digitales</option>
              </select>
            </div>
          </div>

          <div class="grid grid-2">
            <div><label for="e-password">Contraseña</label><input type="password" id="e-password" minlength="8" required /></div>
            <div><label for="e-password2">Confirmar contraseña</label><input type="password" id="e-password2" minlength="8" required /></div>
          </div>
          <div class="field-error" id="e-password-error"></div>

          <div class="form-msg" id="estudiante-msg"></div>

          <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 1.3rem;" id="btn-estudiante">
            Crear cuenta de estudiante
          </button>
        </form>

        <!-- FORMULARIO ASESOR -->
        <form id="form-asesor" class="hidden">
          <div class="grid grid-2">
            <div><label for="a-nombre">Nombre(s)</label><input type="text" id="a-nombre" required /></div>
            <div><label for="a-matricula">Matrícula</label><input type="text" id="a-matricula" required /></div>
          </div>
          <div class="grid grid-2">
            <div><label for="a-ap">Apellido paterno</label><input type="text" id="a-ap" required /></div>
            <div><label for="a-am">Apellido materno</label><input type="text" id="a-am" required /></div>
          </div>

          <label for="a-nacimiento">Fecha de nacimiento</label>
          <input type="date" id="a-nacimiento" required />

          <label for="a-correo">Correo institucional</label>
          <input type="email" id="a-correo" placeholder="utp0139797@alumno.utpuebla.edu.mx" required />
          <div class="field-error" id="a-correo-error"></div>

          <label for="a-cuatrimestre">Cuatrimestre actual</label>
          <input type="number" id="a-cuatrimestre" min="1" max="12" required />
          <div class="field-error" id="a-cuatrimestre-error"></div>

          <label for="a-materia">Materia que quieres asesorar</label>
          <select id="a-materia" required></select>

          <label for="a-curriculum">Cuéntanos tu experiencia (currículum breve)</label>
          <textarea id="a-curriculum" rows="3" required></textarea>

          <div class="grid grid-2">
            <div><label for="a-password">Contraseña</label><input type="password" id="a-password" minlength="8" required /></div>
            <div><label for="a-password2">Confirmar contraseña</label><input type="password" id="a-password2" minlength="8" required /></div>
          </div>
          <div class="field-error" id="a-password-error"></div>

          <div class="form-msg" id="asesor-msg"></div>

          <button type="submit" class="btn btn-primary" style="width:100%; margin-top: 1.3rem;" id="btn-asesor">
            Crear cuenta de asesor
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    const CORREO_DOMINIO = "@alumno.utpuebla.edu.mx";

    // --- toggle de rol ---
    const tabEstudiante = document.getElementById("tab-estudiante");
    const tabAsesor = document.getElementById("tab-asesor");
    const formEstudiante = document.getElementById("form-estudiante");
    const formAsesor = document.getElementById("form-asesor");

    tabEstudiante.addEventListener("click", () => {
      tabEstudiante.classList.add("active");
      tabAsesor.classList.remove("active");
      formEstudiante.classList.remove("hidden");
      formAsesor.classList.add("hidden");
    });
    tabAsesor.addEventListener("click", () => {
      tabAsesor.classList.add("active");
      tabEstudiante.classList.remove("active");
      formAsesor.classList.remove("hidden");
      formEstudiante.classList.add("hidden");
    });

    function showMsg(el, text, type) {
      el.textContent = text;
      el.className = `form-msg show ${type}`;
    }

    // El catálogo de materias es público solo con token, así que en esta
    // pantalla (sin sesión) pedimos con auth:false; si tu backend exige
    // token incluso para /materias, cambia esto por una lista fija.
    async function cargarMateriasAsesor() {
      const select = document.getElementById("a-materia");
      try {
        const materias = await apiFetch(ENDPOINTS.materias, { auth: false });
        const lista = Array.isArray(materias) ? materias : materias.materias || [];
        select.innerHTML =
          `<option value="">Selecciona...</option>` +
          lista.map((m) => `<option value="${m.id}">${m.nombre}</option>`).join("");
      } catch (err) {
        select.innerHTML = `<option value="">No se pudo cargar el catálogo</option>`;
      }
    }
    cargarMateriasAsesor();

    // --- registro estudiante ---
    formEstudiante.addEventListener("submit", async (e) => {
      e.preventDefault();
      const correo = document.getElementById("e-correo").value.trim();
      const correoError = document.getElementById("e-correo-error");
      const passwordError = document.getElementById("e-password-error");
      correoError.textContent = "";
      passwordError.textContent = "";

      const password = document.getElementById("e-password").value;
      const password2 = document.getElementById("e-password2").value;

      let valido = true;
      if (!correo.endsWith(CORREO_DOMINIO)) {
        correoError.textContent = `El correo debe terminar en ${CORREO_DOMINIO}`;
        valido = false;
      }
      if (password !== password2) {
        passwordError.textContent = "Las contraseñas no coinciden";
        valido = false;
      }
      if (!valido) return;

      const btn = document.getElementById("btn-estudiante");
      const msg = document.getElementById("estudiante-msg");
      btn.disabled = true;
      btn.textContent = "Creando cuenta...";

      try {
        await apiFetch(ENDPOINTS.registroEstudiante, {
          method: "POST",
          auth: false,
          body: {
            nombre: document.getElementById("e-nombre").value.trim(),
            apellido_paterno: document.getElementById("e-ap").value.trim(),
            apellido_materno: document.getElementById("e-am").value.trim(),
            fecha_nacimiento: document.getElementById("e-nacimiento").value,
            matricula: document.getElementById("e-matricula").value.trim(),
            cuatrimestre: parseInt(document.getElementById("e-cuatrimestre").value, 10),
            correo,
            password,
            confirmar_password: password2,
            carrera: document.getElementById("e-carrera").value,
          },
        });
        showMsg(msg, "Cuenta creada. Redirigiendo a inicio de sesión...", "ok");
        setTimeout(() => (window.location.href = "index.html"), 1200);
      } catch (err) {
        showMsg(msg, err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Crear cuenta de estudiante";
      }
    });

    // --- registro asesor ---
    formAsesor.addEventListener("submit", async (e) => {
      e.preventDefault();
      const correo = document.getElementById("a-correo").value.trim();
      const correoError = document.getElementById("a-correo-error");
      const cuatri = parseInt(document.getElementById("a-cuatrimestre").value, 10);
      const cuatriError = document.getElementById("a-cuatrimestre-error");
      const passwordError = document.getElementById("a-password-error");
      correoError.textContent = "";
      cuatriError.textContent = "";
      passwordError.textContent = "";

      const password = document.getElementById("a-password").value;
      const password2 = document.getElementById("a-password2").value;

      let valido = true;
      if (!correo.endsWith(CORREO_DOMINIO)) {
        correoError.textContent = `El correo debe terminar en ${CORREO_DOMINIO}`;
        valido = false;
      }
      if (!(cuatri >= 4)) {
        cuatriError.textContent = "Para ser asesor necesitas estar en 4º cuatrimestre o más";
        valido = false;
      }
      if (password !== password2) {
        passwordError.textContent = "Las contraseñas no coinciden";
        valido = false;
      }
      if (!valido) return;

      const btn = document.getElementById("btn-asesor");
      const msg = document.getElementById("asesor-msg");
      btn.disabled = true;
      btn.textContent = "Creando cuenta...";

      try {
        await apiFetch(ENDPOINTS.registroAsesor, {
          method: "POST",
          auth: false,
          body: {
            nombre: document.getElementById("a-nombre").value.trim(),
            apellido_paterno: document.getElementById("a-ap").value.trim(),
            apellido_materno: document.getElementById("a-am").value.trim(),
            fecha_nacimiento: document.getElementById("a-nacimiento").value,
            matricula: document.getElementById("a-matricula").value.trim(),
            cuatrimestre: cuatri,
            correo,
            password,
            confirmar_password: password2,
            materia_id: parseInt(document.getElementById("a-materia").value, 10),
            curriculum: document.getElementById("a-curriculum").value.trim(),
          },
        });
        showMsg(msg, "Registro recibido. Ahora inicia sesión y presenta el examen de tu materia para poder recibir estudiantes.", "ok");
        setTimeout(() => (window.location.href = "index.html"), 2000);
      } catch (err) {
        showMsg(msg, err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = "Crear cuenta de asesor";
      }
    });
  </script>
</body>
</html>
